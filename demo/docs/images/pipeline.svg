<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8eaf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5cae9;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="300" rx="12" fill="url(#bg)"/>

  <!-- Puppy body -->
  <ellipse cx="300" cy="210" rx="70" ry="50" fill="#8d6e63"/>
  <!-- Puppy head -->
  <circle cx="300" cy="140" r="45" fill="#a1887f"/>
  <!-- Ears -->
  <ellipse cx="265" cy="110" rx="18" ry="30" fill="#6d4c41" transform="rotate(-15 265 110)"/>
  <ellipse cx="335" cy="110" rx="18" ry="30" fill="#6d4c41" transform="rotate(15 335 110)"/>
  <!-- Eyes -->
  <circle cx="285" cy="135" r="7" fill="#3e2723"/>
  <circle cx="315" cy="135" r="7" fill="#3e2723"/>
  <circle cx="287" cy="133" r="2.5" fill="white"/>
  <circle cx="317" cy="133" r="2.5" fill="white"/>
  <!-- Nose -->
  <ellipse cx="300" cy="150" rx="8" ry="6" fill="#3e2723"/>
  <!-- Mouth -->
  <path d="M293 156 Q300 165 307 156" stroke="#3e2723" stroke-width="2" fill="none"/>
  <!-- Tongue -->
  <ellipse cx="300" cy="164" rx="5" ry="6" fill="#ef9a9a"/>
  <!-- Front legs -->
  <rect x="275" y="240" width="16" height="30" rx="8" fill="#8d6e63"/>
  <rect x="310" y="240" width="16" height="30" rx="8" fill="#8d6e63"/>
  <!-- Paws -->
  <ellipse cx="283" cy="272" rx="10" ry="5" fill="#6d4c41"/>
  <ellipse cx="318" cy="272" rx="10" ry="5" fill="#6d4c41"/>
  <!-- Tail -->
  <path d="M370 200 Q400 170 390 140" stroke="#8d6e63" stroke-width="12" stroke-linecap="round" fill="none"/>
  <!-- Spots -->
  <circle cx="270" cy="200" r="12" fill="#6d4c41" opacity="0.5"/>
  <circle cx="330" cy="190" r="10" fill="#6d4c41" opacity="0.5"/>

  <!-- Labels -->
  <text x="300" y="25" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#283593">The Zensical Build Pipeline</text>
  <text x="300" y="295" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#5c6bc0">.adoc / .md  &rarr;  Renderer  &rarr;  HTML Post-Processing  &rarr;  Site</text>
</svg>
